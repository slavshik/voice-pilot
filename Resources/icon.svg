<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Rich dark gradient background like Apple apps -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2541"/>
      <stop offset="50%" stop-color="#0b1428"/>
      <stop offset="100%" stop-color="#060d1a"/>
    </linearGradient>
    
    <!-- Letter gradient matching reference - cyan to teal -->
    <linearGradient id="letterGrad" x1="0.2" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#5cebff"/>
      <stop offset="30%" stop-color="#00d4ff"/>
      <stop offset="60%" stop-color="#00a8cc"/>
      <stop offset="100%" stop-color="#006994"/>
    </linearGradient>

    <!-- Highlight/shine gradient -->
    <linearGradient id="shine" x1="0.3" y1="0" x2="0.7" y2="0.6">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow behind letter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feFlood flood-color="#00b4d8" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feComposite in="SourceGraphic"/>
    </filter>

    <!-- Subtle bottom shadow -->
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Inner light effect -->
    <radialGradient id="innerLight" cx="0.4" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#1a3a5c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#060d1a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Full background -->
  <rect width="1024" height="1024" fill="url(#bgGrad)"/>
  
  <!-- Subtle inner light for depth -->
  <rect width="1024" height="1024" fill="url(#innerLight)"/>
  
  <!-- Subtle top edge highlight -->
  <rect y="0" width="1024" height="2" fill="#ffffff" opacity="0.08"/>
  
  <!-- Letter centered: translate to center, scale to fit ~60% -->
  <g transform="translate(285, 85) scale(1.05)">
    <!-- Glow layer -->
    <path filter="url(#glow)" fill="url(#letterGrad)" stroke="none"
      d="M347.3,83.9H51.65c-9.15,0-16.8-6.6-18-15.6L25.1,8.3c-.6-4.5-4.35-7.8-9-7.8h-6.6C4.55.5.5,4.55.5,9.5v.9l21.3,243,14.55,167.25c4.2,47.1,43.5,83.1,90.75,83.1h88.8c10.05,0,18.3-8.1,18.3-18.15,0-.6,0-1.05-.15-1.65l-9.15-105.75c-.9-9.45-8.7-16.65-18.15-16.65h-116.1c-9.15,0-16.8-6.75-18-15.6l-13.5-95.85c0-.45-.15-.9-.15-1.35,0-4.95,4.05-9.15,9.15-9.15h228.9c10.05,0,18.15,8.25,18.15,18.3v236.7c0,5.1,4.05,9.15,9.15,9.15h25.05c10.05,0,18.15,8.1,18.15,18.15v85.05c0,1.2-.15,2.55-.3,3.6-1.8,8.4-9,14.7-17.85,14.7H64.7c-5.1,0-9.15,4.05-9.15,9,0,.6,0,1.2.15,1.65,8.7,47.55,9.75,96.15,3.15,144h161.1c87.9,0,163.35-63,178.95-149.55.9-4.65,1.65-9.3,2.4-13.95,29.4-173.7,16.65-351.9-36.75-519.75-2.4-7.65-9.45-12.75-17.25-12.75Z"/>
    
    <!-- Main filled letter -->
    <path filter="url(#dropShadow)" fill="url(#letterGrad)" stroke="none"
      d="M347.3,83.9H51.65c-9.15,0-16.8-6.6-18-15.6L25.1,8.3c-.6-4.5-4.35-7.8-9-7.8h-6.6C4.55.5.5,4.55.5,9.5v.9l21.3,243,14.55,167.25c4.2,47.1,43.5,83.1,90.75,83.1h88.8c10.05,0,18.3-8.1,18.3-18.15,0-.6,0-1.05-.15-1.65l-9.15-105.75c-.9-9.45-8.7-16.65-18.15-16.65h-116.1c-9.15,0-16.8-6.75-18-15.6l-13.5-95.85c0-.45-.15-.9-.15-1.35,0-4.95,4.05-9.15,9.15-9.15h228.9c10.05,0,18.15,8.25,18.15,18.3v236.7c0,5.1,4.05,9.15,9.15,9.15h25.05c10.05,0,18.15,8.1,18.15,18.15v85.05c0,1.2-.15,2.55-.3,3.6-1.8,8.4-9,14.7-17.85,14.7H64.7c-5.1,0-9.15,4.05-9.15,9,0,.6,0,1.2.15,1.65,8.7,47.55,9.75,96.15,3.15,144h161.1c87.9,0,163.35-63,178.95-149.55.9-4.65,1.65-9.3,2.4-13.95,29.4-173.7,16.65-351.9-36.75-519.75-2.4-7.65-9.45-12.75-17.25-12.75Z"/>

    <!-- Shine overlay on letter -->
    <path fill="url(#shine)" stroke="none"
      d="M347.3,83.9H51.65c-9.15,0-16.8-6.6-18-15.6L25.1,8.3c-.6-4.5-4.35-7.8-9-7.8h-6.6C4.55.5.5,4.55.5,9.5v.9l21.3,243,14.55,167.25c4.2,47.1,43.5,83.1,90.75,83.1h88.8c10.05,0,18.3-8.1,18.3-18.15,0-.6,0-1.05-.15-1.65l-9.15-105.75c-.9-9.45-8.7-16.65-18.15-16.65h-116.1c-9.15,0-16.8-6.75-18-15.6l-13.5-95.85c0-.45-.15-.9-.15-1.35,0-4.95,4.05-9.15,9.15-9.15h228.9c10.05,0,18.15,8.25,18.15,18.3v236.7c0,5.1,4.05,9.15,9.15,9.15h25.05c10.05,0,18.15,8.1,18.15,18.15v85.05c0,1.2-.15,2.55-.3,3.6-1.8,8.4-9,14.7-17.85,14.7H64.7c-5.1,0-9.15,4.05-9.15,9,0,.6,0,1.2.15,1.65,8.7,47.55,9.75,96.15,3.15,144h161.1c87.9,0,163.35-63,178.95-149.55.9-4.65,1.65-9.3,2.4-13.95,29.4-173.7,16.65-351.9-36.75-519.75-2.4-7.65-9.45-12.75-17.25-12.75Z"/>
  </g>
</svg>
